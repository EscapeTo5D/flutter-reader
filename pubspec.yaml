name: flutter_reader
description: "A Flutter reader/book viewer module for embedding in other projects."
version: 0.1.0
homepage: https://github.com/user/flutter_reader

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  # 本地持久化(进度/设置/书签/书架)。默认实现 SqfliteReaderRepository 依赖。
  # 宿主若不用默认实现, 可不引入此依赖(接口 ReaderRepository 无强制依赖)。
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  path_provider: ^2.1.5
  # 弹窗(替换 Flutter 内置 Dialog/BottomSheet)。全局 dialog/attach/toast/loading。
  # 宿主需在 MaterialApp.builder 里包 FlutterSmartDialog.init() (见 example/lib/main.dart)。
  flutter_smart_dialog: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/bg/
